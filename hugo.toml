baseURL = 'https://lug.umbc.edu/'
languageCode = 'en-us'
title = 'UMBC Linux Users Group'
theme = "hextra"
enableGitInfo = true

# Suppress raw HTML warning for badges
ignoreLogs = ['warning-goldmark-raw-html']

# Enable RSS outputs
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

# RSS settings
[outputFormats.RSS]
  mediaType = "application/rss+xml"
  baseName = "feed"

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 2

  [[menu.main]]
    name = "Events"
    url = "/events/"
    weight = 3

  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 3.5

  [[menu.main]]
    name = "Discord"
    url = "https://discord.com/invite/jgMqPtK2mg"
    weight = 4

  [[menu.main]]
    name = "Monitoring"
    url = "https://uptime.blahaj.uno/status/lug"
    weight = 5

  [[menu.main]]
    name = "Mirror"
    url = "/mirror/"
    weight = 6

  [[menu.main]]
    name = "myUMBC"
    url = "https://my3.my.umbc.edu/groups/lug"
    weight = 7
    
  [[menu.main]]
    name = "InstallFest"
    url = "/installfest/"
    weight = 8
    
[params]
  description = "The UMBC Linux Users Group: events, resources, and community for Linux enthusiasts."
