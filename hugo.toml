baseURL = 'https://lug.umbc.edu/'
languageCode = 'en-us'
title = 'UMBC Linux Users Group'
theme = "hextra"
enableGitInfo = true

# Suppress raw HTML warning for badges
ignoreLogs = ['warning-goldmark-raw-html']

# Enable RSS outputs
[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

# RSS settings
[outputFormats.RSS]
  mediaType = "application/rss+xml"
  baseName = "feed"

